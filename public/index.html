<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Article Generator</title>
    <style>
      :root {
        --bg: #f4efe6;
        --panel: #fffaf1;
        --ink: #1e1a16;
        --muted: #5f5548;
        --line: #dccdb9;
        --accent: #156f5f;
        --accent-soft: #d8f3ee;
        --danger: #b72c1f;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Source Han Serif SC", "Noto Serif SC", "PingFang SC", serif;
        background:
          radial-gradient(circle at 0 0, rgba(21, 111, 95, 0.08), transparent 45%),
          radial-gradient(circle at 100% 100%, rgba(183, 44, 31, 0.05), transparent 30%),
          var(--bg);
        color: var(--ink);
      }

      .page {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }

      .hero {
        background: linear-gradient(135deg, #fff7eb 0%, #eef8f6 100%);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 20px;
      }

      h1 {
        margin: 0;
        font-size: 2rem;
      }

      .sub {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(280px, 380px) 1fr;
        gap: 16px;
        margin-top: 16px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 14px;
      }

      label {
        display: block;
        margin: 10px 0 6px;
        font-weight: 600;
      }

      input, textarea, button {
        width: 100%;
        font: inherit;
      }

      input, textarea {
        border: 1px solid #c9b8a0;
        border-radius: 10px;
        padding: 10px;
        background: #fff;
      }

      textarea { min-height: 110px; resize: vertical; }

      button {
        margin-top: 12px;
        border: 0;
        border-radius: 10px;
        padding: 11px 14px;
        cursor: pointer;
        background: var(--accent);
        color: #fff;
        font-weight: 700;
      }

      button:disabled { opacity: 0.6; cursor: not-allowed; }

      .status {
        margin-top: 10px;
        color: var(--muted);
        min-height: 22px;
      }

      .status.error { color: var(--danger); }
      .status.success { color: var(--accent); }

      .article-shell {
        min-height: 420px;
      }

      .article-shell article {
        line-height: 1.8;
      }

      .article-shell h2 {
        margin-top: 30px;
        margin-bottom: 10px;
        border-left: 4px solid var(--accent);
        padding-left: 10px;
      }

      .sec-tools {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-left: 8px;
        font-family: "IBM Plex Sans", "PingFang SC", sans-serif;
        font-size: 13px;
      }

      .btn-mini {
        border: 1px solid var(--accent);
        background: var(--accent-soft);
        color: var(--accent);
        border-radius: 999px;
        width: auto;
        padding: 2px 10px;
        cursor: pointer;
      }

      .fivew1h {
        margin-top: 10px;
        border: 1px dashed #9ac7bd;
        background: #f3fffc;
        border-radius: 8px;
        padding: 10px;
      }

      .fivew1h-row {
        display: grid;
        grid-template-columns: 90px 1fr;
        gap: 8px;
        margin: 6px 0;
      }

      .meta {
        margin-top: 10px;
        font-size: 13px;
        color: var(--muted);
      }

      @media (max-width: 900px) {
        .layout { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1>Article Generator</h1>
        <p class="sub">输入一个带字幕的 YouTube 链接，系统将实时抓取字幕并流式生成中文对话内容文章。若抓取失败，将回退到你输入的字幕文本。</p>
      </section>

      <section class="layout">
        <aside class="card">
          <form id="generateForm">
            <label for="youtubeUrl">YouTube 链接</label>
            <input id="youtubeUrl" name="youtubeUrl" required placeholder="https://www.youtube.com/watch?v=..." />

            <label for="subtitleInput">字幕回退文本（可选）</label>
            <textarea id="subtitleInput" name="subtitleInput" placeholder="当 YouTube 抓取失败时，将使用这里的字幕内容"></textarea>

            <label for="guidance">生成要求（可选，自然语言）</label>
            <textarea id="guidance" name="guidance" placeholder="示例：任务类型=深度分析；输出风格=理性、结构化；目标受众=产品经理；约束=避免夸张结论"></textarea>

            <button id="submitBtn" type="submit">开始流式生成</button>
            <div id="status" class="status"></div>
            <div id="meta" class="meta"></div>
          </form>
        </aside>

        <article class="card article-shell">
          <div id="articleOutput"></div>
        </article>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
